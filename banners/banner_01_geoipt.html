let idx = 0;
let subIdx = 0;
let motionIdx = 0;

const motionPresets = [
  { fromX: -20, fromY: -10, toX: -35, toY: -15 },
  { fromX: -35, fromY: -10, toX: -20, toY: -15 },
  { fromX: -35, fromY: -15, toX: -20, toY: -10 },
  { fromX: -20, fromY: -15, toX: -35, toY: -10 }
];

function getMotionPreset(){
  return motionPresets[motionIdx % motionPresets.length];
}

function rotar(){
  const s = slides[idx];
  if(!s || !s.imgs || !s.imgs.length) return;

  const src = s.imgs[subIdx];
  const motion = getMotionPreset();

  document.getElementById('wrapper').innerHTML =
    '<img src="' + src + '" class="img-layer" alt="banner" ' +
    'style="--from-x:' + motion.fromX + '%;--from-y:' + motion.fromY + '%;--to-x:' + motion.toX + '%;--to-y:' + motion.toY + '%;">';

  document.getElementById('capa-texto').innerText = s.t || '';

  motionIdx++;
  subIdx++;

  if(subIdx >= s.imgs.length){
    subIdx = 0;
    idx = (idx + 1) % slides.length;
  }
}

rotar();
setInterval(rotar, 6000);
