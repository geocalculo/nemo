<head>

  <!-- Cloudflare Web Analytics -->
  <script defer src="https://static.cloudflareinsights.com/beacon.min.js"
          data-cf-beacon='{"token": "af680a7f5f124793802b740c74ae6fea"}'></script>

  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>GeoNEMO - SNASPE</title>

  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <link rel="stylesheet" href="css/index.css" />
</head>
<body>

  <!-- Google Tag Manager (noscript) -->
  <noscript>
    <iframe src="https://www.googletagmanager.com/ns.html?id=GTM-PDTL4LG2"
      height="0" width="0" style="display:none;visibility:hidden"></iframe>
  </noscript>
  <!-- End Google Tag Manager (noscript) -->

  <header class="topbar">
    <div class="topbar-inner">
      <div class="brand-inline">
        <div class="logo-box">🌿</div>

        <div class="brand-text">
          <span class="brand-name">GeoNEMO</span>
          <span class="brand-tagline">Consulta por punto · Vinculación por dentro o proximidad · Salida MapaOut</span>
        </div>
      </div>

      <div class="topbar-right">
        <div class="topbar-kpi">
          <span>📊 Total:</span>
          <strong id="groupSummaryTotalN_top">—</strong>
          <span>sitios</span>
          <span>·</span>
          <strong id="groupSummaryTotalArea_top">—</strong>
        </div>

        <div class="controls-inline">
          <select id="selRegion">
            <option value="">Selecciona región…</option>
          </select>
        </div>
      </div>
    </div>
  </header>

  <div id="map-hint-cursor" class="map-hint">
    Haz clic en el mapa para explorar áreas protegidas
  </div>

  <!-- Resumen por grupo oculto, conservando IDs para espejo en topbar -->
  <div class="sr-summary" aria-hidden="true">
    <table>
      <tbody id="groupSummaryBody">
        <tr><td colspan="3" class="muted">—</td></tr>
      </tbody>
      <tfoot>
        <tr>
          <td>TOTAL</td>
          <td id="groupSummaryTotalN">—</td>
          <td id="groupSummaryTotalArea">—</td>
        </tr>
      </tfoot>
    </table>
  </div>

  <main class="main">
    <div class="layout-home">

      <aside class="side-banner side-banner-left" aria-hidden="true">
        <iframe src="banners/banner_01_geoipt.html" title="Banner GeoIPT" loading="lazy" scrolling="no"></iframe>
      </aside>

      <section class="map-column">
        <section class="mapwrap">
          <div id="map"></div>
          <div id="toast" class="toast" aria-live="polite"></div>
        </section>
      </section>

      <aside class="side-banner side-banner-right" aria-hidden="true">
        <iframe src="banners/banner_geoeva_01.html" title="Banner GeoEVA" loading="lazy" scrolling="no"></iframe>
      </aside>

    </div>
  </main>

  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <script src="https://unpkg.com/@turf/turf@6.5.0/turf.min.js"></script>

  <script src="js/index.js"></script>

  <script>
    (function () {
      const totalN = document.getElementById('groupSummaryTotalN');
      const totalArea = document.getElementById('groupSummaryTotalArea');
      const totalNTop = document.getElementById('groupSummaryTotalN_top');
      const totalAreaTop = document.getElementById('groupSummaryTotalArea_top');

      if (!totalN || !totalArea || !totalNTop || !totalAreaTop) return;

      const syncTotals = () => {
        totalNTop.textContent = totalN.textContent || '—';
        totalAreaTop.textContent = totalArea.textContent || '—';
      };

      syncTotals();

      const observer = new MutationObserver(syncTotals);
      observer.observe(totalN, { childList: true, subtree: true, characterData: true });
      observer.observe(totalArea, { childList: true, subtree: true, characterData: true });
    })();
  </script>

  <!-- Contador de visitas -->
  <div id="visitor-counter" style="
    position:fixed;
    bottom:10px;
    right:12px;
    font-size:12px;
    font-family:Inter, Arial, sans-serif;
    color:#9ca3af;
    background:rgba(0,0,0,0.6);
    padding:6px 10px;
    border-radius:8px;
    backdrop-filter: blur(6px);
    z-index:9999;
  ">
    Visitas:
    <img
      src="https://api.visitorbadge.io/api/visitors?path=geonemo.cl&countColor=%2322c55e"
      alt="contador visitas"
      style="vertical-align:middle;">
  </div>

  <div id="ecosystem-bar">
    <a href="https://geoipt.cl?utm_source=geonemo&utm_medium=mobile_bar&utm_campaign=ecosistema">
      GeoIPT.cl
    </a>
    <a href="https://geoeva.cl?utm_source=geonemo&utm_medium=mobile_bar&utm_campaign=ecosistema">
      GeoEVA.cl
    </a>
  </div>

</body>
</html>
