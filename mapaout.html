<html lang="es">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />

  j=d.createElement(s),dl=l!='dataLayer'?'&l='+l:'';j.async=true;j.src=
  'https://www.googletagmanager.com/gtm.js?id='+i+dl;

  <!-- Leaflet -->
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

  <!-- Turf (área, centroide, distancias) -->
  <script src="https://unpkg.com/@turf/turf@6.5.0/turf.min.js"></script>

  <link rel="stylesheet" href="css/mapaout.css" />
</head>

<body>
  <!-- Google Tag Manager (noscript) -->
  <noscript>
  <iframe src="https://www.googletagmanager.com/ns.html?id=GTM-PDTL4LG2"
  height="0" width="0" style="display:none;visibility:hidden"></iframe>
  </noscript>
  <!-- End Google Tag Manager (noscript) -->

  <header class="topbar">
    <div class="brand">
      <div class="brand__dot"></div>
      <div class="brand__txt">
        <div class="brand__title">GeoNEMO</div>
        <div class="brand__sub">Análisis de sensibilidad territorial y áreas protegidas</div>
      </div>
    </div>

    <div class="topbar__right">
      <button id="btnBack" class="btn btn--ghost" type="button">✕ Cerrar</button>

      <div class="dropdown">
        <button id="btnDownloads" class="btn btn--primary" type="button">Descargar PDF</button>
        <div id="downloadsMenu" class="dropdown__menu" aria-hidden="true">
          <button id="btnDownloadKML" class="menuitem" type="button">Exportar KML</button>
        </div>
      </div>
    </div>
  </header>

  <main class="shell proShell">
    <section class="card proMapCard">
      <div class="cardHead cardHead--kpis">
        <div class="cardTitle">KPIs principales</div>
      </div>
      <div class="heroKpis" id="heroKpis"></div>
    </section>

    <section class="proGrid">
      <article class="card executive"><h3>Resumen Ejecutivo</h3><p id="resumenAreas"></p><button class="btn btn--ghost">Ver interpretación detallada</button></article>
      <article class="card"><div class="cardHead"><h3>Sitios protegidos</h3><span id="groupsCount" class="pill">0</span></div><div id="sitesTable"></div></article>
    </section>

    <section class="card territorialSection">
      <div class="territorialGrid">
        <aside class="kpiPanel kpiPanel--compact" id="mapSideKpis"></aside>

        <div class="mapPanel">
          <div class="cardHead">
            <div class="cardTitle">Mapa Territorial</div>
            <div class="cardHead__right">
              <div id="territorialModeBadge" class="territorialModeBadge">Modo territorial: LOCAL (25 km)</div>
              <div id="coordsDisplay" class="pill">—</div>
              <button class="btnSm btn--ghost" onclick="toggleMainLabels()">Etiquetas</button>
              <button class="btnSm btn--ghost" onclick="recenterMainMap()" type="button">Recentrar</button>
            </div>
          </div>
          <div class="mapFrame"><div id="map"></div><div class="mapOverlaySoft"></div><div class="mapLegendCompact"><div><span class="dot dot--snaspe"></span>SNASPE</div><div><span class="dot dot--ramsar"></span>RAMSAR</div></div><div id="toast" class="toast"></div></div>
        </div>
      </div>
    </section>
  </main>

  <script src="js/mapaout.js?v=gtm-events-20260425"></script>
</body>
</html>
