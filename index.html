<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8" />

  <!-- Google Tag Manager -->
  <script>
  (function(w,d,s,l,i){w[l]=w[l]||[];w[l].push({'gtm.start':
  new Date().getTime(),event:'gtm.js'});var f=d.getElementsByTagName(s)[0],
  j=d.createElement(s),dl=l!='dataLayer'?'&l='+l:'';j.async=true;j.src=
  'https://www.googletagmanager.com/gtm.js?id='+i+dl;
  f.parentNode.insertBefore(j,f);
  })(window,document,'script','dataLayer','GTM-PM7NMT4G');

  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>GeoNEMO - SNASPE</title>

  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
  <link rel="stylesheet" href="css/index.css" />

  <style>
    .statsbar {
      display: block;
      padding: 0.5rem 1rem;
    }

    .statsbar h2 {
      margin: 0 0 0.5rem 0;
      font-size: 1rem;
      font-weight: 600;
      color: #333;
    }

    .group-summary-table {
      width: 100%;
      border-collapse: collapse;
      font-size: 0.85rem;
    }

    .group-summary-table thead {
      background: #f5f5f5;
      border-bottom: 2px solid #ddd;
    }

    .group-summary-table th {
      padding: 0.4rem 0.6rem;
      text-align: left;
      font-weight: 600;
      color: #555;
    }

    .group-summary-table th:nth-child(2),
    .group-summary-table th:nth-child(3),
    .group-summary-table td:nth-child(2),
    .group-summary-table td:nth-child(3) {
      text-align: right;
    }

    .group-summary-table tbody tr {
      border-bottom: 1px solid #eee;
    }

    .group-summary-table tbody tr:hover {
      background: #f9f9f9;
    }

    .group-summary-table td {
      padding: 0.35rem 0.6rem;
      color: #333;
    }

    .group-summary-table td.muted {
      color: #999;
      font-style: italic;
      text-align: center;
    }

    .group-summary-table tfoot {
      background: #f0f8ff;
      border-top: 2px solid #3498db;
      font-weight: 600;
    }

    .group-summary-table tfoot td {
      padding: 0.5rem 0.6rem;
      color: #2c3e50;
    }
  </style>
</head>
<body>

  <!-- Google Tag Manager (noscript) -->
  <noscript>
    <iframe src="https://www.googletagmanager.com/ns.html?id=GTM-PM7NMT4G"
    height="0" width="0" style="display:none;visibility:hidden"></iframe>
  </noscript>
  <!-- End Google Tag Manager (noscript) -->

  <header class="topbar">
    <div class="brand">
      <div class="logo">🌿</div>
      <div class="title">
        <h1>GeoNEMO</h1>
        <span>Consulta por punto · Vinculación por dentro o proximidad · Salida MapaOut</span>
      </div>
    </div>

    <div class="controls">
      <select id="selRegion">
        <option value="">Selecciona región…</option>
      </select>
    </div>
  </header>

  <div id="map-hint-cursor" class="map-hint">
    Haz clic en el mapa para explorar áreas protegidas
  </div>

  <div class="statsbar" aria-live="polite">
    <h2>📊 Resumen por grupo (BBOX visible)</h2>
    <table class="group-summary-table">
      <thead>
        <tr>
          <th>Grupo</th>
          <th>Sitios</th>
          <th>Superficie</th>
        </tr>
      </thead>
      <tbody id="groupSummaryBody">
        <tr><td colspan="3" class="muted">—</td></tr>
      </tbody>
      <tfoot>
        <tr>
          <td>TOTAL</td>
          <td id="groupSummaryTotalN">—</td>
          <td id="groupSummaryTotalArea">—</td>
        </tr>
      </tfoot>
    </table>
  </div>

  <main class="main">
    <section class="mapwrap">
      <div id="map"></div>
      <div id="toast" class="toast" aria-live="polite"></div>
    </section>
  </main>

  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <script src="https://unpkg.com/@turf/turf@6.5.0/turf.min.js"></script>

  <script src="js/index.js"></script>
</body>
</html>
