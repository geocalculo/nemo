  <style>*{box-sizing:border-box}html,body,#app{margin:0;padding:0;width:100%;height:100%;font-family:Arial,Helvetica,sans-serif;background:#f4f6f8;color:#1f2933}#app{display:flex;flex-direction:column;position:relative}#main-header{min-height:86px;background:#102a43;color:#fff;display:grid;grid-template-columns:minmax(260px,420px) 1fr;align-items:center;padding:12px 18px;gap:16px;border-bottom:3px solid #38bdf8}.brand-block{display:flex;flex-direction:column;gap:4px}#site-title{font-size:26px;font-weight:700;letter-spacing:.5px}#site-subtitle{font-size:14px;color:#cbd5e1;font-weight:700}#site-description{margin:0;color:#dbeafe;font-size:13px;line-height:1.35}#summary-bar{display:flex;justify-content:center;gap:14px}.summary-item{min-width:130px;background:rgba(255,255,255,.08);border-radius:10px;padding:8px 12px;text-align:center}.summary-value{display:block;font-size:20px;font-weight:700}.summary-label{display:block;font-size:11px;color:#cbd5e1}button,.home-link{border:none;border-radius:8px;padding:8px 11px;cursor:pointer;background:#e2e8f0;color:#102a43;font-weight:600;text-decoration:none}button:hover,.home-link:hover{background:#bae6fd}#control-bar{min-height:52px;background:#fff;display:flex;align-items:center;gap:10px;padding:8px 14px;border-bottom:1px solid #d9e2ec}#control-bar select{height:34px;border:1px solid #bcccdc;border-radius:8px;padding:0 10px;font-size:14px}#main-layout{position:relative;flex:1;min-height:0}#territorial-panel{position:absolute;top:16px;left:16px;z-index:500;width:320px;background:#fff;border:1px solid #d9e2ec;border-radius:20px;padding:18px;box-shadow:0 20px 45px rgba(15,23,42,.12);overflow-y:auto}#territorial-panel h3{margin:0 0 14px;color:#102a43}.panel-section{background:#f8fafc;border:1px solid #e2e8f0;border-radius:10px;padding:12px;margin-bottom:12px}.panel-note{font-size:13px;color:#64748b;line-height:1.4;margin:.4rem 0 0}.disabled-card{display:block;text-align:center;border-radius:10px;padding:10px 12px;background:#e2e8f0;color:#64748b;font-weight:800;text-decoration:none;pointer-events:none}#map-container{position:relative;overflow:hidden;width:100%;height:100%;min-height:0}#map{position:absolute;inset:0;width:100%;height:100%;z-index:1}.map-toggle{position:absolute;top:14px;right:14px;z-index:1005;display:flex;gap:6px;padding:4px;border-radius:999px;background:rgba(20,20,20,.72);box-shadow:0 6px 18px rgba(0,0,0,.28)}.map-toggle-btn{border-radius:999px;padding:7px 12px;font-size:12px;color:#fff;background:transparent}.map-toggle-btn.active{color:#111;background:#fff}#btn-my-location{position:absolute;top:64px;right:16px;z-index:1002;width:42px;height:42px;border-radius:12px;background:#fff;font-size:20px;box-shadow:0 8px 20px rgba(15,23,42,.18)}.mobile-layer-toggle{position:absolute;top:66px;left:16px;z-index:2000;display:inline-flex;align-items:center;gap:6px;border:1px solid #cbd5e1;border-radius:999px;background:#fff;color:#334155;font-size:12px;font-weight:800;box-shadow:0 10px 24px rgba(15,23,42,.18)}#search-box-wrapper{position:absolute;z-index:2500;top:16px;left:50%;transform:translateX(-50%);width:min(620px,calc(100% - 360px))}#search-box{width:100%;height:44px;border:1px solid #cbd5e1;border-radius:999px;padding:0 18px;font-size:14px;box-shadow:0 10px 24px rgba(15,23,42,.18)}#map-hint{position:absolute;left:50%;bottom:28px;z-index:1200;transform:translate(-50%,0);max-width:min(560px,calc(100% - 32px));border-radius:999px;background:rgba(15,23,42,.88);color:#fff;font-size:14px;font-weight:700;line-height:1.35;padding:10px 16px;text-align:center;pointer-events:none}#main-footer{height:28px;background:#102a43;color:#cbd5e1;font-size:12px;display:flex;align-items:center;justify-content:center;gap:6px}#main-footer a{color:inherit;text-decoration:none}@media(max-width:768px){#main-header{grid-template-columns:1fr}#summary-bar{justify-content:flex-start;overflow:auto}.summary-item{min-width:112px}#control-bar{overflow:auto}#territorial-panel{display:none}#map-container{height:100%;min-height:420px}#search-box-wrapper{top:12px;left:12px;right:12px;width:auto;transform:none}#search-box{height:42px;border-radius:14px}.map-toggle{top:66px;right:12px}#btn-my-location{top:116px;right:12px;width:40px;height:40px}.mobile-layer-toggle{top:116px;left:12px}}</style>

<body>
  <div id="app">
    <header id="main-header"><div class="brand-block"><div id="site-title">GeoNEMO</div><div id="site-subtitle">Áreas Protegidas y Conservación</div><p id="site-description">Explorador territorial para áreas protegidas, conservación, biodiversidad y restricciones ambientales.</p></div><div id="summary-bar"><div class="summary-item kpi-card" data-summary-id="total_snaspe"><span class="summary-value kpi-value">0</span><span class="summary-label kpi-label">SNASPE</span></div><div class="summary-item kpi-card" data-summary-id="area_snaspe"><span class="summary-value kpi-value">0 ha</span><span class="summary-label kpi-label">Área SNASPE</span></div><div class="summary-item kpi-card" data-summary-id="total_ramsar"><span class="summary-value kpi-value">0</span><span class="summary-label kpi-label">Ramsar</span></div><div class="summary-item kpi-card" data-summary-id="area_ramsar"><span class="summary-value kpi-value">0 ha</span><span class="summary-label kpi-label">Área Ramsar</span></div></div></header>
    <section id="control-bar"><select id="country-selector"><option value="CL">Chile</option></select><select id="region-selector"><option value="">Todas las regiones</option></select><button id="btn-search">Buscar</button><button id="btn-clear">Limpiar</button><a class="home-link" href="../index.html">GeoX</a></section>
    <main id="main-layout"><aside id="territorial-panel"><h3 id="panel-title">Etiquetas</h3><div class="panel-section panel-layer-controls" aria-label="Control de etiquetas GeoNEMO"><label class="panel-layer-toggle"><input type="checkbox" data-nemo-label-toggle="snaspe" /> <span>SNASPE</span></label><label class="panel-layer-toggle"><input type="checkbox" data-nemo-label-toggle="ramsar" /> <span>Sitios Ramsar</span></label></div></aside><section id="map-container"><div id="search-box-wrapper"><input id="search-box" type="text" placeholder="Buscar territorio, objeto o capa..." autocomplete="off" /><div id="search-results"></div></div><div id="map"></div><div id="mobile-map-controls"><div class="map-toggle"><button id="btn-osm" class="map-toggle-btn active" data-map="osm" aria-pressed="true">OSM</button><button id="btn-sat" class="map-toggle-btn" data-map="sat" aria-pressed="false">SAT</button></div><button id="btn-my-location" title="Centrar en mi ubicación">📍</button><button id="mobile-layer-toggle" class="mobile-layer-toggle is-inactive" type="button" aria-pressed="false" aria-label="Mostrar etiquetas" title="Mostrar etiquetas"><span class="mobile-layer-toggle-icon" aria-hidden="true"><svg class="mobile-layer-toggle-svg" viewBox="0 0 24 24" aria-hidden="true" focusable="false"><path d="M3 3l18 18" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"/><path d="M2.5 12s3.5-6 9.5-6c2.1 0 3.9.72 5.36 1.7M21.5 12s-3.5 6-9.5 6c-2.1 0-3.9-.72-5.36-1.7" fill="none" stroke="currentColor" stroke-width="1.9" stroke-linecap="round" stroke-linejoin="round"/><path d="M9.8 9.8A3 3 0 0 1 14.2 14.2" fill="none" stroke="currentColor" stroke-width="1.9" stroke-linecap="round"/></svg></span><span class="mobile-layer-toggle-text">Etiquetas</span></button></div><div id="map-hint" class="is-visible">Capas GeoNEMO visibles</div></section></main>
    <footer id="main-footer"><a href="../geoipt/index.html" data-geox-target="../geoipt/index.html">GeoIPT</a><span>·</span><a href="../geoeva/index.html" data-geox-target="../geoeva/index.html">GeoEVA</a><span>·</span><a href="../geonemo/index.html" data-geox-target="../geonemo/index.html">GeoNEMO</a><span>·</span><a href="../geonoxa/index.html" data-geox-target="../geonoxa/index.html">GeoNOXA</a></footer>
  </div>
